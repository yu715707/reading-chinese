<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉字训练 - 汉字认知训练平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
        }

        .header-left h1 {
            color: #667eea;
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .progress-info {
            color: #999;
            font-size: 0.9em;
        }

        .character-display {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #f0f4ff;
            border-radius: 15px;
        }

        .character-large {
            font-size: 5em;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .character-info {
            color: #666;
            font-size: 0.95em;
        }

        .stage {
            margin-bottom: 30px;
        }

        .stage-title {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .stage-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            margin-right: 15px;
            font-weight: bold;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .option-btn {
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
            font-weight: bold;
        }

        .option-btn:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateY(-2px);
        }

        .option-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option-btn.correct {
            background: #27ae60;
            color: white;
            border-color: #27ae60;
        }

        .option-btn.incorrect {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .feedback {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-weight: bold;
        }

        .feedback.show {
            display: block;
        }

        .feedback.success {
            background: #e8f8f5;
            color: #27ae60;
            border-left: 4px solid #27ae60;
        }

        .feedback.error {
            background: #ffe6e6;
            color: #e74c3c;
            border-left: 4px solid #e74c3c;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button.btn-primary {
            flex: 1;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button.btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button.btn-secondary {
            padding: 15px 30px;
            background: #f0f4ff;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        button.btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .result-screen {
            display: none;
            text-align: center;
        }

        .result-screen.show {
            display: block;
        }

        .result-emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .result-text {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .result-score {
            font-size: 1.2em;
            color: #667eea;
            margin-bottom: 30px;
        }

        .stage-container {
            display: none;
        }

        .stage-container.active {
            display: block;
        }

        .multi-select-info {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .character-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .char-tab {
            padding: 8px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .char-tab.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .char-tab:hover {
            border-color: #667eea;
        }

        .sound-btn {
            padding: 8px 15px;
            font-size: 0.9em;
            margin-bottom: 15px;
            background: #f0f4ff;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .sound-btn:hover {
            background: #667eea;
            color: white;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .character-large {
                font-size: 3em;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .options {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>📚 汉字训练</h1>
                <div class="progress-info" id="progressInfo"></div>
            </div>
            <button class="btn-secondary" onclick="goBack()">← 返回</button>
        </div>

        <!-- 字符导航 -->
        <div class="character-nav" id="characterNav"></div>

        <div class="character-display">
            <div class="character-large" id="characterDisplay">清</div>
            <div class="character-info" id="characterInfo"></div>
        </div>

        <!-- 第1关：学习关 -->
        <div class="stage-container active" id="stage1">
            <div class="stage">
                <div class="stage-title">
                    <div class="stage-number">1</div>
                    学习关 - 认识这个汉字
                </div>
                <div id="learningContent"></div>
                <div class="controls">
                    <button class="btn-primary" onclick="nextStage()">我已了解 →</button>
                </div>
            </div>
        </div>

        <!-- 第2关：字音训练 -->
        <div class="stage-container" id="stage2">
            <div class="stage">
                <div class="stage-title">
                    <div class="stage-number">2</div>
                    字音训练 - 根据拼音找汉字
                </div>
                <div class="feedback" id="feedback2"></div>
                <p style="margin-bottom: 15px; color: #666;">听拼音，选择正确的汉字：</p>
                <p style="margin-bottom: 10px; font-size: 1.2em; font-weight: bold; color: #667eea;" id="pinyinDisplay"></p>
                <button class="sound-btn" onclick="playPronunciation()" title="点击播放发音">🔊 播放发音</button>
                <div class="options" id="options2"></div>
                <div class="controls">
                    <button class="btn-primary" id="submitBtn2" onclick="checkAnswer(2)">提交答案</button>
                    <button class="btn-secondary" onclick="skipStage()">跳过</button>
                </div>
            </div>
        </div>

        <!-- 第3关：结构识别 -->
        <div class="stage-container" id="stage3">
            <div class="stage">
                <div class="stage-title">
                    <div class="stage-number">3</div>
                    结构识别 - 选择正确的部件
                </div>
                <div class="feedback" id="feedback3"></div>
                <div class="multi-select-info">💡 提示：这个汉字由多个部件组成，请选择所有正确的部件</div>
                <p style="margin-bottom: 15px; color: #666;">这个汉字由哪些部件组成？</p>
                <div class="options" id="options3"></div>
                <div class="controls">
                    <button class="btn-primary" id="submitBtn3" onclick="checkAnswer(3)">提交答案</button>
                    <button class="btn-secondary" onclick="skipStage()">跳过</button>
                </div>
            </div>
        </div>

        <!-- 第4关：结构生成 -->
        <div class="stage-container" id="stage4">
            <div class="stage">
                <div class="stage-title">
                    <div class="stage-number">4</div>
                    结构生成 - 用部件重组汉字
                </div>
                <div class="feedback" id="feedback4"></div>
                <p style="margin-bottom: 15px; color: #666;">用这些部件组合成一个汉字：</p>
                <div style="margin-bottom: 20px; padding: 15px; background: #f0f4ff; border-radius: 10px;">
                    <span id="componentsDisplay" style="font-size: 1.3em; font-weight: bold; color: #667eea;"></span>
                </div>
                <p style="margin-bottom: 15px; color: #666;">选择正确的汉字：</p>
                <div class="options" id="options4"></div>
                <div class="controls">
                    <button class="btn-primary" id="submitBtn4" onclick="checkAnswer(4)">提交答案</button>
                    <button class="btn-secondary" onclick="skipStage()">跳过</button>
                </div>
            </div>
        </div>

        <!-- 完成屏幕 -->
        <div class="result-screen" id="resultScreen">
            <div class="result-emoji" id="resultEmoji">🎉</div>
            <div class="result-text" id="resultText">训练完成！</div>
            <div class="result-score" id="resultScore"></div>
            <div class="controls">
                <button class="btn-primary" onclick="restartTraining()">重新训练</button>
                <button class="btn-secondary" onclick="goBack()">返回首页</button>
            </div>
        </div>
    </div>

    <script>
        // 完整的汉字数据库
        const charactersDatabase = {
            清: { char: '清', pinyin: 'qīng', meanings: ['水很干净', '清楚，明白', '安静'], components: ['氵', '青'] },
            情: { char: '情', pinyin: 'qíng', meanings: ['感受，感情', '情况，状况', '爱好'], components: ['忄', '青'] },
            晴: { char: '晴', pinyin: 'qíng', meanings: ['天气没有云', '阳光充足', '天气放晴'], components: ['日', '青'] },
            请: { char: '请', pinyin: 'qǐng', meanings: ['恳求，要求', '邀请', '有礼貌地表达'], components: ['讠', '青'] },
            山: { char: '山', pinyin: 'shān', meanings: ['高耸的地形', '山脉', '山地'], components: [] },
            水: { char: '水', pinyin: 'shuǐ', meanings: ['液体', '河水', '清水'], components: [] },
            火: { char: '火', pinyin: 'huǒ', meanings: ['燃烧', '热', '灾难'], components: [] },
            人: { char: '人', pinyin: 'rén', meanings: ['人类', '个人', '人物'], components: [] },
            大: { char: '大', pinyin: 'dà', meanings: ['大的', '大小', '年纪大'], components: [] },
            小: { char: '小', pinyin: 'xiǎo', meanings: ['小的', '小小', '年纪小'], components: [] },
            说: { char: '说', pinyin: 'shuō', meanings: ['讲话', '述说', '理论'], components: ['讠', '兑'] },
            硕: { char: '硕', pinyin: 'shuò', meanings: ['大的', '学位', '智慧'], components: ['石', '頁'] },
            拼: { char: '拼', pinyin: 'pīn', meanings: ['拼命', '拼接', '组合'], components: ['扌', '片'] },
            河: { char: '河', pinyin: 'hé', meanings: ['河流', '江河', '水道'], components: ['氵', '可'] },
            花: { char: '花', pinyin: 'huā', meanings: ['植物花', '花朵', '彩色'], components: ['艹', '化'] },
            跑: { char: '跑', pinyin: 'pǎo', meanings: ['奔跑', '跑动', '逃跑'], components: ['足', '包'] },
            跳: { char: '跳', pinyin: 'tiào', meanings: ['跳跃', '跳动', '舞蹈'], components: ['足', '兆'] },
            一: { char: '一', pinyin: 'yī', meanings: ['数字一', '单个', '第一'], components: [] },
            二: { char: '二', pinyin: 'èr', meanings: ['数字二', '第二个', '两个'], components: [] },
            三: { char: '三', pinyin: 'sān', meanings: ['数字三', '三个', '第三'], components: [] },
            四: { char: '四', pinyin: 'sì', meanings: ['数字四', '四个', '方向'], components: [] },
            五: { char: '五', pinyin: 'wǔ', meanings: ['数字五', '五个', '中间'], components: [] },
            六: { char: '六', pinyin: 'liù', meanings: ['数字六', '六个', '多数'], components: [] },
            七: { char: '七', pinyin: 'qī', meanings: ['数字七', '七个', '一周'], components: [] },
            八: { char: '八', pinyin: 'bā', meanings: ['数字八', '八个', '分开'], components: [] },
            九: { char: '九', pinyin: 'jiǔ', meanings: ['数字九', '九个', '最多'], components: [] },
            十: { char: '十', pinyin: 'shí', meanings: ['数字十', '十个', '完全'], components: [] },
        };

        // 从 URL 参数获取待训练的字
        const urlParams = new URLSearchParams(window.location.search);
        let targetChars = (urlParams.get('chars') || '清').split(',').filter(c => c);
        let currentCharIndex = 0;
        let targetChar = targetChars[0];
        let currentStage = 1;
        let score = 0;
        let selectedAnswers = {};
        let selectedComponents = new Set();

        function init() {
            if (targetChars.length === 0 || !charactersDatabase[targetChar]) {
                alert('汉字不存在，返回首页');
                window.location.href = 'index.html';
                return;
            }
            
            updateDisplay();
            generateCharacterNav();
            generateStage1();
            updateProgress();
        }

        function generateCharacterNav() {
            const nav = document.getElementById('characterNav');
            nav.innerHTML = '';
            targetChars.forEach((char, index) => {
                const tab = document.createElement('button');
                tab.className = `char-tab ${index === currentCharIndex ? 'active' : ''}`;
                tab.textContent = char;
                tab.onclick = () => switchCharacter(index);
                nav.appendChild(tab);
            });
        }

        function switchCharacter(index) {
            currentCharIndex = index;
            targetChar = targetChars[currentCharIndex];
            currentStage = 1;
            selectedAnswers = {};
            selectedComponents = new Set();
            updateDisplay();
            generateCharacterNav();
            generateStage1();
            updateProgress();

            document.querySelectorAll('.stage-container').forEach(el => {
                el.classList.remove('active');
            });
            document.getElementById('stage1').classList.add('active');
            document.getElementById('resultScreen').classList.remove('show');
        }

        function updateDisplay() {
            const char = charactersDatabase[targetChar];
            document.getElementById('characterDisplay').textContent = targetChar;
            document.getElementById('characterInfo').textContent = `拼音：${char.pinyin}`;
        }

        function updateProgress() {
            document.getElementById('progressInfo').textContent = 
                `字 ${currentCharIndex + 1}/${targetChars.length} | 第 ${currentStage}/4 关`;
        }

        function generateStage1() {
            const char = charactersDatabase[targetChar];
            let html = `
                <div style="text-align: left; background: #f0f4ff; padding: 20px; border-radius: 10px;">
                    <p style="margin-bottom: 15px;"><strong>拼音：</strong> ${char.pinyin}</p>
                    <p style="margin-bottom: 15px;"><strong>含义：</strong></p>
                    <ul style="margin-left: 20px;">
            `;
            char.meanings.forEach(m => {
                html += `<li style="margin-bottom: 8px;">${m}</li>`;
            });
            html += `</ul>`;
            if (char.components.length > 0) {
                html += `<p style="margin-top: 15px;"><strong>部件组成：</strong> ${char.components.join(' + ')}</p>`;
            } else {
                html += `<p style="margin-top: 15px;"><strong>结构：</strong> 独体字，无法拆分</p>`;
            }
            html += `</div>`;
            document.getElementById('learningContent').innerHTML = html;
        }

        function generateStage2() {
            const char = charactersDatabase[targetChar];
            document.getElementById('pinyinDisplay').textContent = char.pinyin;
            
            const allChars = Object.keys(charactersDatabase);
            const options = [targetChar];
            while (options.length < 4) {
                const randomChar = allChars[Math.floor(Math.random() * allChars.length)];
                if (!options.includes(randomChar)) {
                    options.push(randomChar);
                }
            }
            options.sort(() => Math.random() - 0.5);
            
            let html = '';
            options.forEach((char) => {
                html += `<button class="option-btn" onclick="selectAnswer(2, '${char}')" data-answer="${char}">${char}</button>`;
            });
            document.getElementById('options2').innerHTML = html;
        }

        function playPronunciation() {
            const utterance = new SpeechSynthesisUtterance(targetChar);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        function generateStage3() {
            const char = charactersDatabase[targetChar];
            if (char.components.length === 0) {
                skipStage();
                return;
            }
            
            selectedComponents.clear();
            
            const correctComponents = char.components;
            const allComponents = ['氵', '忄', '青', '日', '讠', '山', '水', '火', '人', '大', '小', '石', '頁', '扌', '可', '艹', '化', '足', '包', '兆', '片'];
            const options = [...correctComponents];
            
            while (options.length < 6) {
                const component = allComponents[Math.floor(Math.random() * allComponents.length)];
                if (!options.includes(component)) {
                    options.push(component);
                }
            }
            options.sort(() => Math.random() - 0.5);
            
            let html = '';
            options.forEach((component) => {
                html += `<button class="option-btn" onclick="selectComponent('${component}')" data-answer="${component}">${component}</button>`;
            });
            document.getElementById('options3').innerHTML = html;
        }

        function selectComponent(component) {
            if (selectedComponents.has(component)) {
                selectedComponents.delete(component);
                event.target.classList.remove('selected');
            } else {
                selectedComponents.add(component);
                event.target.classList.add('selected');
            }
        }

        function generateStage4() {
            const char = charactersDatabase[targetChar];
            if (char.components.length === 0) {
                skipStage();
                return;
            }
            
            document.getElementById('componentsDisplay').textContent = char.components.join(' + ');
            
            const allChars = Object.keys(charactersDatabase);
            const options = [targetChar];
            while (options.length < 4) {
                const randomChar = allChars[Math.floor(Math.random() * allChars.length)];
                if (!options.includes(randomChar)) {
                    options.push(randomChar);
                }
            }
            options.sort(() => Math.random() - 0.5);
            
            let html = '';
            options.forEach((char) => {
                html += `<button class="option-btn" onclick="selectAnswer(4, '${char}')" data-answer="${char}">${char}</button>`;
            });
            document.getElementById('options4').innerHTML = html;
        }

        function selectAnswer(stage, answer) {
            selectedAnswers[stage] = answer;
            document.querySelectorAll(`#options${stage} .option-btn`).forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
        }

        function checkAnswer(stage) {
            let isCorrect = false;
            const feedback = document.getElementById(`feedback${stage}`);
            
            if (stage === 3) {
                const char = charactersDatabase[targetChar];
                const correctSet = new Set(char.components);
                isCorrect = selectedComponents.size === correctSet.size &&
                    [...selectedComponents].every(c => correctSet.has(c));
                
                if (isCorrect) {
                    feedback.textContent = '✅ 答对了！';
                    feedback.className = 'feedback show success';
                    score += 25;
                } else {
                    feedback.textContent = `❌ 答错了，正确答案是：${char.components.join(' + ')}`;
                    feedback.className = 'feedback show error';
                }
                
                document.querySelectorAll(`#options${stage} .option-btn`).forEach(btn => {
                    btn.disabled = true;
                    if (char.components.includes(btn.dataset.answer)) {
                        btn.classList.add('correct');
                    } else if (selectedComponents.has(btn.dataset.answer)) {
                        btn.classList.add('incorrect');
                    }
                });
            } else {
                const answer = selectedAnswers[stage];
                if (!answer) {
                    alert('请选择一个答案');
                    return;
                }

                isCorrect = answer === targetChar;
                
                if (isCorrect) {
                    feedback.textContent = '✅ 答对了！';
                    feedback.className = 'feedback show success';
                    score += 25;
                } else {
                    feedback.textContent = `❌ 答错了，正确答案是"${targetChar}"`;
                    feedback.className = 'feedback show error';
                }
                
                document.querySelectorAll(`#options${stage} .option-btn`).forEach(btn => {
                    btn.disabled = true;
                    if (btn.dataset.answer === targetChar) {
                        btn.classList.add('correct');
                    } else if (btn.dataset.answer === answer) {
                        btn.classList.add('incorrect');
                    }
                });
            }
            
            const btn = document.getElementById(`submitBtn${stage}`);
            btn.textContent = '下一关 →';
            btn.onclick = () => nextStage();
        }

        function nextStage() {
            currentStage++;
            
            if (currentStage > 4) {
                if (currentCharIndex < targetChars.length - 1) {
                    currentCharIndex++;
                    targetChar = targetChars[currentCharIndex];
                    currentStage = 1;
                    selectedAnswers = {};
                    selectedComponents = new Set();
                    
                    updateDisplay();
                    generateCharacterNav();
                    generateStage1();
                    updateProgress();

                    document.querySelectorAll('.stage-container').forEach(el => {
                        el.classList.remove('active');
                    });
                    document.getElementById('stage1').classList.add('active');
                } else {
                    showResult();
                }
            } else {
                const stageEl = document.getElementById(`stage${currentStage}`);
                document.querySelectorAll('.stage-container').forEach(el => {
                    el.classList.remove('active');
                });
                stageEl.classList.add('active');
                
                document.getElementById(`feedback${currentStage}`).classList.remove('show');
                
                if (currentStage === 2) generateStage2();
                else if (currentStage === 3) generateStage3();
                else if (currentStage === 4) generateStage4();
                
                updateProgress();
            }
        }

        function skipStage() {
            nextStage();
        }

        function showResult() {
            document.querySelectorAll('.stage-container').forEach(el => {
                el.classList.remove('active');
            });
            document.getElementById('resultScreen').classList.add('show');
            
            const maxScore = targetChars.length * 100;
            document.getElementById('resultScore').textContent = `得分: ${score} / ${maxScore}`;
            
            const percentage = (score / maxScore) * 100;
            if (percentage >= 80) {
                document.getElementById('resultEmoji').textContent = '🎉';
                document.getElementById('resultText').textContent = '太棒了！';
            } else if (percentage >= 60) {
                document.getElementById('resultEmoji').textContent = '😊';
                document.getElementById('resultText').textContent = '做得不错！';
            } else {
                document.getElementById('resultEmoji').textContent = '💪';
                document.getElementById('resultText').textContent = '再加油！';
            }
        }

        function restartTraining() {
            currentCharIndex = 0;
            targetChar = targetChars[0];
            currentStage = 1;
            score = 0;
            selectedAnswers = {};
            selectedComponents = new Set();
            init();
            document.getElementById('resultScreen').classList.remove('show');
            document.getElementById('stage1').classList.add('active');
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
